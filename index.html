    <style>
      :root {
        --bg-color: #1e1e2e;
        --text-color: #cdd6f4;
        --accent-color: #89b4fa;
        --folder-color: #f9e2af;
        --line-color: #45475a;
        --hover-bg: #313244;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 40px;
        line-height: 1.6;
      }

      h1 {
        color: var(--accent-color);
        border-bottom: 2px solid var(--line-color);
        padding-bottom: 10px;
        margin-bottom: 30px;
        font-size: 24px;
        text-align: center;
      }

      /* Стилизация дерева */
      .tree {
        max-width: 780px;
        margin: auto;
      }

      .tree,
      .tree ul {
        list-style: none;
        padding: 0;
      }

      .tree ul {
        margin-left: 24px;
        position: relative;
      }

      /* Вертикальные линии соединения */
      .tree ul::before {
        content: "";
        position: absolute;
        top: 0;
        left: -12px;
        border-left: 1px dashed var(--line-color);
        height: 100%;
      }

      .tree li {
        margin: 0;
        padding: 6px 0;
        position: relative;
        font-size: 15px;
      }

      /* Горизонтальные линии к элементам */
      .tree li::before {
        content: "";
        position: absolute;
        top: 18px;
        left: -12px;
        border-top: 1px dashed var(--line-color);
        width: 12px;
      }

      /* Последний элемент ветки обрезает линию */
      .tree li:last-child::before {
        background: var(--bg-color);
        height: auto;
      }

      .tree li:last-child::after {
        content: "";
        position: absolute;
        top: 18px;
        left: -13px;
        bottom: 0;
        border-left: 1px solid var(--bg-color);
        width: 1px;
      }

      /* Интерактивный тег details/summary */
      details {
        display: block;
      }

      summary {
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s;
        font-weight: 600;
        color: var(--accent-color);
        outline: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      summary:hover {
        background-color: var(--hover-bg);
      }

      /* Убираем стандартную стрелку браузера */
      summary::-webkit-details-marker {
        display: none;
      }
      summary {
        list-style: none;
      }

      /* Кастомный маркер состояния */
      summary::before {
        content: "▶";
        display: inline-block;
        font-size: 10px;
        transition: transform 0.2s;
        color: var(--folder-color);
      }

      details[open] > summary::before {
        transform: rotate(90deg);
      }

      /* Стили для конечных листьев (лексем) */
      .leaf {
        padding: 4px 8px;
        color: var(--text-color);
        display: inline-block;
      }

      .leaf::before {
        content: "📄";
        margin-right: 8px;
        font-size: 12px;
      }
    </style>
  </head>

    <h1>Карта компетенций & Процессы QA</h1>

  <script>
    function renderTreeFromObject(treeData) {
      // 1. Функция для рекурсивного обхода объекта
      function buildTree(node) {
        const ul = document.createElement("ul");
        ul.className = "tree";

        // Проходим по всем ключам текущего уровня объекта
        for (const key in node) {
          if (!node.hasOwnProperty(key)) continue;

          const li = document.createElement("li");
          const value = node[key];

          // Если значение — это объект (и не массив), значит есть вложенные узлы
          if (
            typeof value === "object" &&
            value !== null &&
            !Array.isArray(value)
          ) {
            const details = document.createElement("details");

            const summary = document.createElement("summary");
            summary.textContent = key;

            details.appendChild(summary);

            // Рекурсивный вызов для построения вложенной структуры
            const childUl = buildTree(value);
            details.appendChild(childUl);

            li.appendChild(details);
          } else {
            // Если значение — строка/число, это конечный элемент (leaf)
            const span = document.createElement("span");
            span.className = "leaf";
            // Если ключ — просто индекс или технический, выводим только значение
            span.textContent = isNaN(key) ? `${key}: ${value}` : value;

            li.appendChild(span);
          }

          ul.appendChild(li);
        }

        return ul;
      }

      const rootElement = buildTree(treeData);
      document.body.appendChild(rootElement);
    }
