<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Senior Competency Tree</title>
    <style>
      :root {
        --bg-color: #1e1e2e;
        --text-color: #cdd6f4;
        --accent-color: #89b4fa;
        --folder-color: #f9e2af;
        --line-color: #45475a;
        --hover-bg: #313244;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 40px;
        line-height: 1.6;
      }

      h1 {
        color: var(--accent-color);
        border-bottom: 2px solid var(--line-color);
        padding-bottom: 10px;
        margin-bottom: 30px;
        font-size: 24px;
      }

      /* Стилизация дерева */
      .tree {
        max-width: 780px;
        margin: auto;
      }

      .tree,
      .tree ul {
        list-style: none;
        padding: 0;
      }

      .tree ul {
        margin-left: 24px;
        position: relative;
      }

      /* Вертикальные линии соединения */
      .tree ul::before {
        content: "";
        position: absolute;
        top: 0;
        left: -12px;
        border-left: 1px dashed var(--line-color);
        height: 100%;
      }

      .tree li {
        margin: 0;
        padding: 6px 0;
        position: relative;
        font-size: 15px;
      }

      /* Горизонтальные линии к элементам */
      .tree li::before {
        content: "";
        position: absolute;
        top: 18px;
        left: -12px;
        border-top: 1px dashed var(--line-color);
        width: 12px;
      }

      /* Последний элемент ветки обрезает линию */
      .tree li:last-child::before {
        background: var(--bg-color);
        height: auto;
      }

      .tree li:last-child::after {
        content: "";
        position: absolute;
        top: 18px;
        left: -13px;
        bottom: 0;
        border-left: 1px solid var(--bg-color);
        width: 1px;
      }

      /* Интерактивный тег details/summary */
      details {
        display: block;
      }

      summary {
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s;
        font-weight: 600;
        color: var(--accent-color);
        outline: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      summary:hover {
        background-color: var(--hover-bg);
      }

      /* Убираем стандартную стрелку браузера */
      summary::-webkit-details-marker {
        display: none;
      }
      summary {
        list-style: none;
      }

      /* Кастомный маркер состояния */
      summary::before {
        content: "▶";
        display: inline-block;
        font-size: 10px;
        transition: transform 0.2s;
        color: var(--folder-color);
      }

      details[open] > summary::before {
        transform: rotate(90deg);
      }

      /* Стили для конечных листьев (лексем) */
      .leaf {
        padding: 4px 8px;
        color: var(--text-color);
        display: inline-block;
      }

      .leaf::before {
        content: "📄";
        margin-right: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Карта компетенций & Процессы QA</h1>
  </body>
  <script>
    function renderTreeFromObject(treeData) {
      // 1. Функция для рекурсивного обхода объекта
      function buildTree(node) {
        const ul = document.createElement("ul");
        ul.className = "tree";

        // Проходим по всем ключам текущего уровня объекта
        for (const key in node) {
          if (!node.hasOwnProperty(key)) continue;

          const li = document.createElement("li");
          const value = node[key];

          // Если значение — это объект (и не массив), значит есть вложенные узлы
          if (
            typeof value === "object" &&
            value !== null &&
            !Array.isArray(value)
          ) {
            const details = document.createElement("details");

            const summary = document.createElement("summary");
            summary.textContent = key;

            details.appendChild(summary);

            // Рекурсивный вызов для построения вложенной структуры
            const childUl = buildTree(value);
            details.appendChild(childUl);

            li.appendChild(details);
          } else {
            // Если значение — строка/число, это конечный элемент (leaf)
            const span = document.createElement("span");
            span.className = "leaf";
            // Если ключ — просто индекс или технический, выводим только значение
            span.textContent = isNaN(key) ? `${key}: ${value}` : value;

            li.appendChild(span);
          }

          ul.appendChild(li);
        }

        return ul;
      }

      const rootElement = buildTree(treeData);
      document.body.appendChild(rootElement);
    }

    renderTreeFromObject({
      "Тест-анализ (Test Analysis)": {
        1: "Анализ и декомпозиция требований (ТЗ, Спецификации, User Stories)",
        2: "Поиск логических дыр и неопределенностей (Static Testing / Shift-Left)",
        3: "Оценка и приоритизация продуктовых рисков (Risk-Based Testing)",
        4: "Формирование базиса тестирования (Test Basis) и тестовых условий",
        5: "Построение матрицы трассируемости (Traceability Matrix)",
        "Продвинутый уровень": {
          Автоматизация: "Написание тест-кейсов под автоматизацию",
          Инструменты: "Работа с Mind Maps",
        },
      },
      "Тест-дизайн (Test Design)": {
        "Техники черного ящика (Black-box Techniques)": {
          "Разбиение на классы эквивалентности (Equivalence Partitioning)": {
            Зачем: `Исключить хаотичный перебор миллиардов
                                комбинаций и сэкономить время. Мы делим бесконечный
                                поток данных на группы, внутри которых система ведет
                                себя одинаково. А границы проверяют места, где
                                логика кода меняется (операторы <, >, <=, >=), ведь
                                именно там разработчики чаще всего ошибаются в
                                знаках.`,
            "В каком случае применяют": `Любые поля ввода
                                (регистрация, возраст), лимиты в финансовых
                                транзакциях, валидация длины строк (имя, пароль),
                                ограничения на размер загружаемого файла.`,
            "Пример обоснования для QA": `«В поле "Сумма перевода"
                                от 100 до 150 000 рублей я не буду вводить каждую
                                цифру. Я выделю 3 класса (меньше 100, валидный
                                диапазон, больше 150 000) и возьму из них по одной
                                точке. Для проверки стыков в коде я применю BVA и
                                проверю ровно 4 значения на границах: 99.99, 100,
                                150 000 и 150 000.01. Это сократит количество тестов
                                с бесконечности до 7, покрыв 99% рисков».`,
            "Позитивный/Негативный": {
              1: "Здесь разделение видно нагляднее всего, так как сами классы данных изначально делятся по этому принципу.",
              "Позитивный сценарий": `Ввод значений из валидного
                                (разрешенного) класса или проверка валидных границ.
                                Пример: Ввод возраста 18 или 65. Система должна
                                успешно пропустить пользователя.`,
              "Негативный сценарий": `Ввод значений из невалидных классов,
                                проверка невалидных границ или нарушение типов
                                данных. Пример: Ввод возраста 17 или спецсимволов
                                @#$. Система должна заблокировать отправку и
                                показать понятную ошибку.`,
            },
          },
          "Таблицы решений (Decision Table)": {
            Зачем: `Визуализировать сложную бизнес-логику со
                                множеством перекрестных условий. Если требований
                                много, их тяжело удержать в голове — QA-инженер
                                легко пропустит скрытый сценарий. Таблица решений
                                превращает хаос из ТЗ в строгую матрицу «Условие =>
                                Действие».`,
            "В каком случае применять": `Расчет скидок и кэшбэка
                                (например: если клиент премиальный И сумма покупки >
                                5000 И сегодня день рождения => скидка 20%),
                                кредитные и страховые калькуляторы, логика
                                авторизации (сочетания правильных/неправильных
                                логинов, паролей и капчи).`,
            "Пример обоснования для QA": `«Когда в требованиях к
                                корзине интернет-магазина написано "Если
                                пользователь авторизован, примените скидку А, но
                                если у него есть промокод, то примените Б, а если он
                                из региона Х, то..." — текстовый чек-лист писать
                                опасно. Я составлю Таблицу решений. Она наглядно
                                покажет все пересечения условий (Да/Нет) и ожидаемый
                                результат для каждого микса. Это гарантирует, что мы
                                не пропустим ни одного скрытого бага в
                                бизнес-логике».`,
            "Позитивный/Негативный": {
              1: `Таблица решений строится на пересечении условий
                                («Да»/«Нет»), и часть её столбцов изначально
                                зарезервирована под негативные сценарии
                                бизнес-логики.`,
              "Позитивный сценарий": `Столбцы таблицы,
                                где все условия для выполнения действия соблюдены.
                                Пример: Пользователь авторизован (Да) + Баланс
                                положителен (Да) → Ожидаемое действие: Перевод
                                выполнен успешно.`,
              "Негативный сценарий": `Столбцы, где
                                хотя бы одно обязательное условие нарушено, и
                                система должна отказать в операции. Пример:
                                Пользователь авторизован (Да) + Баланс положителен
                                (Нет) → Ожидаемое действие: Показ ошибки
                                «Недостаточно средств».`,
            },
          },
          "Диаграмма переходов состояний (State-Transition)": {
            Зачем: `Проверить логику изменения статусов объекта во
                              времени. Техника гарантирует, что объект (заказ,
                              пользователь, документ) движется по системе строго по
                              правилам и не может перепрыгнуть через этап или
                              застрять в невалидном состоянии.`,
            "В каком случае применять": `Жизненный цикл заказа Корзина => Оплачен => В доставке => Доставлен.
            Статусы публикаций на сайтах Черновик => На модерации => Опубликовано`,
            "Пример обоснования для QA": `«Для тестирования фичи
                              "Доставка" я нарисую граф или таблицу переходов
                              состояний. С её помощью я проверю не только позитивный
                              путь заказа, но и негативные переходы (глушилки).
                              Например, что система заблокирует попытку перевести
                              заказ из статуса "Корзина" сразу в статус "Доставлен",
                              минуя оплату, или не позволит отменить заказ, который
                              уже передан курьеру».`,
            "Позитивный/Негативный": {
              1: "В этой технике позитив и негатив определяют направление движения по цепочке статусов объекта.",
              "Позитивный сценарий": `Перевод объекта по разрешенным
                              (валидным) переходам. Пример: Перевод интернет-заказа
                              из статуса «Принят» в статус «Оплачен».`,
              "Негативный сценарий": `Попытка совершить запрещенный (невалидный)
                              переход — так называемые «глушилки». Пример: Попытка
                              перевести заказ из статуса «Корзина» напрямую в статус
                              «Доставлен» (минуя оплату и сборку), либо попытка
                              отменить заказ, который уже «Вручен клиенту». Система
                              должна жестко заблокировать такое действие на бэкенде.`,
            },
          },
          "Попарное тестирование (Pairwise Testing)": {
            Зачем: `Сократить количество тестов в разы при
                                комбинации множества настроек. Техника базируется на
                                математическом правиле: около 90% всех дефектов
                                вызываются сочетанием максимум двух факторов. Вместо
                                тестирования всех возможных комбинаций (полный
                                перебор) мы тестируем только уникальные пары.`,
            "В каком случае применять": `Формы с множеством фильтров
                                (например, поиск авиабилетов или товаров на
                                маркетплейсе), конфигураторы продуктов (выбор цвета +
                                объема памяти + ОС + страны для смартфона),
                                тестирование кроссбраузерности (ОС + Браузер +
                                Разрешение экрана).`,
            "Пример обоснования для QA": `«Если у нас есть форма
                                заказа с 5 фильтрами, в каждом из которых по 2
                                значения, полный перебор — это \(2^5 = 32\) теста.
                                Тестировать это вручную — неэффективная трата времени
                                компании. Я применю Pairwise (через инструмент PICT
                                или AllPairs), который сгенерирует всего 6–8
                                комбинаций. Мы сэкономим 75% времени на прогон тестов,
                                проверив при этом каждую пару параметров друг с
                                другом».`,
            "Позитивный сценарий": `Комбинация исключительно валидных
                                параметров между собой. Мы ищем баги, которые
                                возникают при пересечении двух разрешенных настроек.
                                Пример: Выбор телефона iPhone + цвет Green + память
                                256GB. Всё должно успешно добавиться в корзину.`,
            "Негативный сценарий": `Комбинация, где один или
                                несколько параметров являются невалидными, либо
                                проверка недопустимых сочетаний (negative pairwise).
                                Пример: Выбор телефона iPhone + операционная система
                                Android. Система должна корректно обработать этот
                                конфликт (например, скрыть несовместимую ОС или выдать
                                предупреждение).`,
          },
        },
        "Техники белого ящика (White-box Techniques)": {
          "Покрытие операторов, ветвей и условий (Statement/Branch Coverage)":
            "",
        },
        "Техники на основе опыта (Experience-based)": {
          "Предугадывание ошибок (Error Guessing)": "",
          "Исследовательское тестирование (Exploratory Testing)": "",
        },
      },
      "Виды и уровни тестирования (Test Types & Levels) — Направления и фокус проверок":
        {
          "По функциональности": {
            "Функциональное (Functional Testing)": {
              1: "",
            },
            "Нефункциональное (Non-Functional)":
              "Нефункциональное (Non-Functional: Performance, Security, Usability, Accessibility, Compatibility, Localization)",
          },
          "По связанности с изменениями": {
            "Регрессионное (Regression Testing)": "",
            "Санитарное / Смоук (Sanity / Smoke Testing)": "",
          },
        },
      "Пирамида QA (Test Pyramid & Strategy) — Экономика и распределение тестов":
        {
          "1. Unit-уровень (Модульные тесты изолированных функций) Jest/Vitest":
            {
              "Что проверяют":
                "Изолированные функции, методы, классы (например, та самая JS-функция).",
              Объем: "~60-70% от общего числа тестов в проекте.",
              фокус:
                "Выполняются за миллисекунды, запускаются локально разработчиком и в CI/CD на каждый коммит. Стоимость бага здесь близка к нулю.",
            },
          "2. Integration-уровень (Проверка контрактов API, интеграционных шлюзов, БД)":
            {
              "Что проверяют":
                "Взаимодействие между модулями, сервисами, базами данных или внешними API.",
              Объем: "~20-30%.",
              фокус:
                "Здесь проверяются контракты (Contract Testing), корректность интеграционных шлюзов и кэширование. Они медленнее юнит-тестов, так как требуют поднятия Docker-контейнеров или тестовых баз (хотя внешние зависимости все еще часто мокаются). ",
            },
          "3. E2E / UI-уровень (Сквозные пользовательские сценарии)": {
            "Что проверяют":
              "Целостные пользовательские сценарии через реальный интерфейс (браузер, мобильное приложение) от начала до конца.",
            Объем: "~5-10%.",
            фокус:
              "Самые дорогие в разработке и поддержке тесты. Они нестабильны (flaky), медленные и зависят от стабильности окружения. Senior QA автоматизирует здесь только критический путь (Happy Path) и основные бизнес-риски. ",
          },
          "4. Облако над пирамидой — Ручное тестирование (Exploratory)": {
            1: "Никакая автоматизация не покрывает 100% продукта. Сверху пирамиды всегда остается слой исследовательского и юзабилити-тестирования, выполняемый человеком.",
          },
          "Альтернативные модели архитектуры (Тестируемые соты / Testing Honeycomb)":
            "",
          "Антипаттерны автоматизации («Рожок мороженого», «Песочные часы»)":
            "",
        },
      "Autotesting (Автоматизация тестирования) — Инженерная реализация пирамиды":
        {
          "Выбор технологического стека (Язык программирования, фреймворки: Playwright, Cypress, Selenium, Jest/Vitest)":
            {
              Playwright: "ts/js, python",
              Cypress: "ts/js",
              Selenium: "Java",
            },
          "Паттерны проектирования автотестов (Page Object Model, Screenplay, Builders)":
            "",
          "Управление тестовыми данными (Test Data Management: фикстуры, фабрики, моки)":
            "",
          "Интеграция в CI/CD (Запуск тестов на каждый коммит/PR, пайплайны в GitLab/GitHub Actions)":
            "",
          "Борьба с нестабильными тестами (Flaky Tests Mitigation) и анализ отчетов (Allure)":
            "",
        },
    });
  </script>
</html>
